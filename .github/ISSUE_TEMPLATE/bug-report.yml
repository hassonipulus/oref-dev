name: "דיווח על באג"
description: "משהו לא עובד כמו שצריך? ספרו בבקשה"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "כתבו כותרת קצרה בשדה למעלה, ופרטו כאן למטה."
  - type: textarea
    id: description
    attributes:
      label: "מה קרה?"
      placeholder: "תארו את הבעיה — מה ראיתם, האם בטלפון או במחשב, שתפו צילום מסך אם יש"
    validations:
      required: true
